<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#34495e"/></marker></defs>
<rect width="1100" height="680" fill="#fbfdff"/><text x="42" y="48" font-size="30" font-family="Microsoft JhengHei,Arial" font-weight="700" fill="#1f3763">Bellman-Ford Algorithm</text><text x="42" y="80" font-size="18" font-family="Microsoft JhengHei,Arial" fill="#445">允許負邊但不允許負 cycle</text><text x="60" y="120" font-size="22" font-family="Microsoft JhengHei,Arial" font-weight="700" fill="#d35400" text-anchor="start">Frame 1: 允許負邊</text><line x1="160" y1="330" x2="330" y2="210" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="245.0" cy="270.0" r="16" fill="#fff" stroke="#ccc"/><text x="245.0" y="276.0" font-size="15" font-family="Arial" text-anchor="middle">6</text><line x1="160" y1="330" x2="520" y2="210" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="340.0" cy="270.0" r="16" fill="#fff" stroke="#ccc"/><text x="340.0" y="276.0" font-size="15" font-family="Arial" text-anchor="middle">5</text><line x1="330" y1="210" x2="330" y2="460" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="330.0" cy="335.0" r="16" fill="#fff" stroke="#ccc"/><text x="330.0" y="341.0" font-size="15" font-family="Arial" text-anchor="middle">-2</text><line x1="520" y1="210" x2="330" y2="460" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="425.0" cy="335.0" r="16" fill="#fff" stroke="#ccc"/><text x="425.0" y="341.0" font-size="15" font-family="Arial" text-anchor="middle">1</text><line x1="330" y1="460" x2="560" y2="460" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="445.0" cy="460.0" r="16" fill="#fff" stroke="#ccc"/><text x="445.0" y="466.0" font-size="15" font-family="Arial" text-anchor="middle">-1</text><line x1="560" y1="460" x2="740" y2="330" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="650.0" cy="395.0" r="16" fill="#fff" stroke="#ccc"/><text x="650.0" y="401.0" font-size="15" font-family="Arial" text-anchor="middle">3</text><line x1="520" y1="210" x2="740" y2="330" stroke="#789" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="630.0" cy="270.0" r="16" fill="#fff" stroke="#ccc"/><text x="630.0" y="276.0" font-size="15" font-family="Arial" text-anchor="middle">7</text><circle cx="160" cy="330" r="28" fill="#ffe2d5" stroke="#1f6fbf" stroke-width="3"/><text x="160" y="337" font-size="21" font-family="Arial" font-weight="700" text-anchor="middle">0</text><circle cx="330" cy="210" r="28" fill="#ffe2d5" stroke="#1f6fbf" stroke-width="3"/><text x="330" y="217" font-size="21" font-family="Arial" font-weight="700" text-anchor="middle">1</text><circle cx="520" cy="210" r="28" fill="#e9f2ff" stroke="#1f6fbf" stroke-width="3"/><text x="520" y="217" font-size="21" font-family="Arial" font-weight="700" text-anchor="middle">2</text><circle cx="330" cy="460" r="28" fill="#e9f2ff" stroke="#1f6fbf" stroke-width="3"/><text x="330" y="467" font-size="21" font-family="Arial" font-weight="700" text-anchor="middle">3</text><circle cx="560" cy="460" r="28" fill="#e9f2ff" stroke="#1f6fbf" stroke-width="3"/><text x="560" y="467" font-size="21" font-family="Arial" font-weight="700" text-anchor="middle">4</text><circle cx="740" cy="330" r="28" fill="#e9f2ff" stroke="#1f6fbf" stroke-width="3"/><text x="740" y="337" font-size="21" font-family="Arial" font-weight="700" text-anchor="middle">5</text><rect x="800" y="135" width="250" height="410" rx="10" fill="#f8fbff" stroke="#9ab" stroke-width="2"/><text x="825" y="175" font-size="22" font-family="Microsoft JhengHei,Arial" font-weight="700" fill="#1f3763" text-anchor="start">dist[k] table</text><text x="825" y="225" font-size="18" font-family="Microsoft JhengHei,Arial" font-weight="400" fill="#333" text-anchor="start">k=1: direct edges</text><text x="825" y="280" font-size="18" font-family="Microsoft JhengHei,Arial" font-weight="400" fill="#333" text-anchor="start">k=2: allow 2 edges</text><text x="825" y="335" font-size="18" font-family="Microsoft JhengHei,Arial" font-weight="400" fill="#333" text-anchor="start">k=3: allow 3 edges</text><text x="825" y="390" font-size="18" font-family="Microsoft JhengHei,Arial" font-weight="400" fill="#333" text-anchor="start">k=n-1: final</text><text x="825" y="445" font-size="18" font-family="Microsoft JhengHei,Arial" font-weight="400" fill="#333" text-anchor="start">再多一輪：偵測負 cycle</text></svg>