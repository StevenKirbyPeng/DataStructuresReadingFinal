<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="100%" height="100%" fill="#f7fbff"/>
<style>.title{font:700 26px Arial;fill:#111}.sub{font:16px Arial;fill:#222}.small{font:13px Arial;fill:#333}.tiny{font:11px Arial;fill:#333}.box{fill:#e8f4ff;stroke:#6aa1d8;stroke-width:1.4}.hot{fill:#ffe6e6;stroke:#d93025;stroke-width:2.5}.ok{fill:#e6f4ea;stroke:#188038;stroke-width:2}.note{fill:#fff7d6;stroke:#d9a300;stroke-width:1.5}.gray{fill:#eeeeee;stroke:#888}.node{fill:#dbeafe;stroke:#2b73bd;stroke-width:2}.data{fill:#fef3c7;stroke:#b7791f;stroke-width:1.5}.link{fill:#ecfdf5;stroke:#047857;stroke-width:1.5}.ptr{stroke:#4b5563;stroke-width:2.2;fill:none;marker-end:url(#arr)}.redptr{stroke:#dc2626;stroke-width:3;fill:none;marker-end:url(#arrRed)}.dash{stroke:#777;stroke-width:2;fill:none;stroke-dasharray:6 5;marker-end:url(#arr)}</style>
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/></marker><marker id="arrRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker></defs>
<rect x="28" y="22" width="1220" height="72" rx="14" fill="#e8f2ff" stroke="#4f8bd6" stroke-width="2"/>
<text x="54" y="58" class="title">Pointer Manipulation</text>
<text x="54" y="82" class="sub">Step 1 / 8 - 由 C++ 程式輸出 step-by-step SVG 動畫</text>
<rect x="790" y="130" width="420" height="160" rx="8" class="box"/>
<text x="815" y="162" class="title">Step state table</text>
<text x="815" y="195" class="sub">Current step = 1</text>
<text x="815" y="225" class="small">Red = this step's active pointer/data change</text>
<text x="815" y="252" class="small">Blue/gray = existing structure or waiting nodes</text>
<rect x="790" y="315" width="420" height="190" rx="8" class="note"/>
<text x="815" y="348" class="title">Animation focus</text>
<text x="815" y="382" class="small">- 先保存 next</text>
<text x="815" y="406" class="small">- 把新節點指向後方</text>
<text x="815" y="430" class="small">- 再讓前節點指向新節點</text>
<text x="60" y="135" class="sub">Insert new node after p: new-&gt;link = p-&gt;link, then p-&gt;link = new.</text>
<text x="90" y="185" class="sub">p</text>
<rect x="130" y="210" width="78" height="52" rx="8" class="data"/>
<text x="169" y="242" font-family="Arial" font-size="18" text-anchor="middle">A</text>
<rect x="208" y="210" width="38" height="52" rx="8" class="link"/>
<text x="227" y="242" font-family="Arial" font-size="18" text-anchor="middle">*</text>
<rect x="430" y="210" width="78" height="52" rx="8" class="data"/>
<text x="469" y="242" font-family="Arial" font-size="18" text-anchor="middle">B</text>
<rect x="508" y="210" width="38" height="52" rx="8" class="link"/>
<text x="527" y="242" font-family="Arial" font-size="18" text-anchor="middle">*</text>
<line x1="246" y1="236" x2="430" y2="236" class="ptr"/>
<rect x="280" y="360" width="78" height="52" rx="8" class="data"/>
<text x="319" y="392" font-family="Arial" font-size="18" text-anchor="middle">X</text>
<rect x="358" y="360" width="38" height="52" rx="8" class="link"/>
<text x="377" y="392" font-family="Arial" font-size="18" text-anchor="middle">*</text>
<text x="280" y="340" class="small">new node</text>
<text x="70" y="520" class="small">順序不可顛倒：若先 p-&gt;link = new，原本 B 的位址會遺失，造成串列斷掉。</text>
<rect x="80" y="640" width="820" height="42" rx="8" class="ok"/>
<text x="105" y="667" class="small">This SVG frame is generated by C++ program: 04_pointer_manipulation.cpp. HTML only loads generated step_XX.svg files.</text>
</svg>
