<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700">
<rect width="100%" height="100%" fill="white"/>
<style>.title{font:700 28px Arial;fill:#111}.sub{font:17px Arial;fill:#333}.small{font:13px Arial;fill:#333}.num{font:18px Arial;text-anchor:middle;dominant-baseline:middle}.box{fill:#E8F4FF;stroke:#333;stroke-width:1.5}.hot{fill:#F8CECC;stroke:#C00000;stroke-width:2}.ok{fill:#D5E8D4;stroke:#2E7D32;stroke-width:2}.note{fill:#FFF2CC;stroke:#555;stroke-width:1.5}.null{fill:#eee;stroke:#777;stroke-width:1}.edge{stroke:#333;stroke-width:2;fill:none}.red{stroke:red;stroke-width:3;fill:none}.green{stroke:#00A651;stroke-width:3;fill:none}.dash{stroke:#777;stroke-width:2;fill:none;stroke-dasharray:6 5}.ptr{stroke:#333;stroke-width:2;fill:none;marker-end:url(#arrow)}.rptr{stroke:red;stroke-width:2.5;fill:none;marker-end:url(#arrowRed)}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker><marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="red"/></marker></defs>
<text x="30" y="42" class="title">07 Binary Tree Formulas Step by Step</text>
<rect x="30" y="55" width="180" height="42" rx="8" class="note"/>
<text x="120" y="76" class="num">Step 4 / 8</text>
<text x="230" y="83" class="sub" text-anchor="start">level i has at most 2^(i-1)</text>
<circle cx="560" cy="200" r="18" class="box"/>
<text x="560" y="200" class="num">1</text>
<text x="90" y="205" class="sub" text-anchor="start">Level 1: max 2^0</text>
<circle cx="520" cy="280" r="18" class="box"/>
<text x="520" y="280" class="num">1</text>
<circle cx="600" cy="280" r="18" class="box"/>
<text x="600" y="280" class="num">2</text>
<text x="90" y="285" class="sub" text-anchor="start">Level 2: max 2^1</text>
<circle cx="440" cy="360" r="18" class="box"/>
<text x="440" y="360" class="num">1</text>
<circle cx="520" cy="360" r="18" class="box"/>
<text x="520" y="360" class="num">2</text>
<circle cx="600" cy="360" r="18" class="box"/>
<text x="600" y="360" class="num">3</text>
<circle cx="680" cy="360" r="18" class="box"/>
<text x="680" y="360" class="num">4</text>
<text x="90" y="365" class="sub" text-anchor="start">Level 3: max 2^2</text>
<circle cx="280" cy="440" r="18" class="hot"/>
<text x="280" y="440" class="num">1</text>
<circle cx="360" cy="440" r="18" class="hot"/>
<text x="360" y="440" class="num">2</text>
<circle cx="440" cy="440" r="18" class="hot"/>
<text x="440" y="440" class="num">3</text>
<circle cx="520" cy="440" r="18" class="hot"/>
<text x="520" y="440" class="num">4</text>
<circle cx="600" cy="440" r="18" class="hot"/>
<text x="600" y="440" class="num">5</text>
<circle cx="680" cy="440" r="18" class="hot"/>
<text x="680" y="440" class="num">6</text>
<circle cx="760" cy="440" r="18" class="hot"/>
<text x="760" y="440" class="num">7</text>
<circle cx="840" cy="440" r="18" class="hot"/>
<text x="840" y="440" class="num">8</text>
<text x="90" y="445" class="sub" text-anchor="start">Level 4: max 2^3</text>
<rect x="650" y="170" width="360" height="240" rx="8" class="note"/>
<text x="830" y="290" class="num">2^(i-1)</text>
</svg>
