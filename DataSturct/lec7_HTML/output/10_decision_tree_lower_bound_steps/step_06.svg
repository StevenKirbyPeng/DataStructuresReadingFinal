ient='auto'><path d='M0,0 L0,8 L11,4 z' fill='#64748b'/></marker></defs><line x1='365' y1='232' x2='245' y2='280' stroke='#64748b' stroke-width='2' marker-end='url(#ar64748b2)'/><defs><marker id='ar64748b2' markerWidth='12' markerHeight='12' refX='10' refY='4' orient='auto'><path d='M0,0 L0,8 L11,4 z' fill='#64748b'/></marker></defs><line x1='365' y1='232' x2='485' y2='280' stroke='#64748b' stroke-width='2' marker-end='url(#ar64748b2)'/><defs><marker id='ar64748b2' markerWidth='12' markerHeight='12' refX='10' refY='4' orient='auto'><path d='M0,0 L0,8 L11,4 z' fill='#64748b'/></marker></defs><line x1='245' y1='322' x2='185' y2='370' stroke='#64748b' stroke-width='2' marker-end='url(#ar64748b2)'/><defs><marker id='ar64748b2' markerWidth='12' markerHeight='12' refX='10' refY='4' orient='auto'><path d='M0,0 L0,8 L11,4 z' fill='#64748b'/></marker></defs><line x1='245' y1='322' x2='305' y2='370' stroke='#64748b' stroke-width='2' marker-end='url(#ar64748b2)'/><defs><marker id='ar64748b2' markerWidth='12' markerHeight='12' refX='10' refY='4' orient='auto'><path d='M0,0 L0,8 L11,4 z' fill='#64748b'/></marker></defs><line x1='485' y1='322' x2='425' y2='370' stroke='#64748b' stroke-width='2' marker-end='url(#ar64748b2)'/><text x='90' y='475' font-size='16' fill='#111827' font-weight='700' font-family='Arial'>For n records, comparison sorting requires enough leaves for all n! permutations.</text><text x='90' y='505' font-size='16' fill='#b91c1c' font-weight='700' font-family='Arial'>Therefore worst-case height is at least log2(n!) = Omega(n log n).</text><rect x='720' y='120' width='380' height='185' rx='10' fill='#fff' stroke='#8aa' stroke-width='1.6'/><text x='740' y='154' font-size='20' fill='#123' font-weight='700' font-family='Arial'>Step state table</text><text x='740' y='188' font-size='16' fill='#102030' font-weight='400' font-family='Arial'>Current step = 6</text><text x='740' y='222' font-size='16' fill='#102030' font-weight='400' font-family='Arial'>Red = active comparison / move</text><text x='740' y='256' font-size='16' fill='#102030' font-weight='400' font-family='Arial'>Green = sorted or fixed part</text><text x='740' y='290' font-size='16' fill='#102030' font-weight='400' font-family='Arial'>Use Next/Prev or Auto Play</text><rect x='720' y='330' width='380' height='190' rx='10' fill='#fff7d6' stroke='#e0a800' stroke-width='1.6'/><text x='740' y='365' font-size='20' fill='#6b2d1a' font-weight='700' font-family='Arial'>Animation focus</text><text x='740' y='400' font-size='15' fill='#4b2e2e' font-weight='400' font-family='Arial'>- comparison sort as binary tree</text><text x='740' y='428' font-size='15' fill='#4b2e2e' font-weight='400' font-family='Arial'>- each leaf is one permutation</text><text x='740' y='456' font-size='15' fill='#4b2e2e' font-weight='400' font-family='Arial'>- need at least n! leaves</text><text x='740' y='484' font-size='15' fill='#4b2e2e' font-weight='400' font-family='Arial'>- height is lower bound</text><rect x='70' y='625' width='1000' height='38' rx='8' fill='#f0fff4' stroke='#56a45f' stroke-width='1.8'/><text x='90' y='650' font-size='14' fill='#102030' font-weight='400' font-family='Arial'>This SVG frame is generated by C++ program: 10_decision_tree_lower_bound.cpp. HTML only loads generated step_XX.svg files.</text></svg>